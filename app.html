const today = () => {

  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${w[d.getDay()]})`;
};

const getKstWindow = () => {
  const now = new Date();
  const fmt = new Intl.DateTimeFormat("sv-SE", {timeZone:"Asia/Seoul",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hour12:false});
  const parts = Object.fromEntries(fmt.formatToParts(now).filter(p=>p.type!=="literal").map(p=>[p.type,p.value]));
  const y=Number(parts.year),mo=Number(parts.month),d=Number(parts.day),h=Number(parts.hour),mi=Number(parts.minute);
  const end = `${y}-${String(mo).padStart(2,"0")}-${String(d).padStart(2,"0")} ${String(h).padStart(2,"0")}:${String(mi).padStart(2,"0")} KST`;
  // start = 전날 20:00 KST (항상 전날 기준)
  const base = new Date(Date.UTC(y,mo-1,d));
  base.setUTCDate(base.getUTCDate()-1);
  const sy=base.getUTCFullYear(),sm=String(base.getUTCMonth()+1).padStart(2,"0"),sd=String(base.getUTCDate()).padStart(2,"0");
  return { start:`${sy}-${sm}-${sd} 20:00 KST`, end };
};

// JSON 파서
const tryParse = (s) => {
  if (!s || !s.trim()) return null;
  const c = s.replace(/```json|```/gi,"").trim();
  // Try object
  const os = c.indexOf("{"), oe = c.lastIndexOf("}");
  if (os > -1 && oe > os) { try { return JSON.parse(c.slice(os,oe+1)); } catch(e) {} }
  // Try array
  const as = c.indexOf("["), ae = c.lastIndexOf("]");
  if (as > -1 && ae > as) { try { return JSON.parse(c.slice(as,ae+1)); } catch(e) {} }
  return null;
};

const impSort = (arr) => [...(arr||[])].sort((a,b) =>
  (({high:0,medium:1,low:2}[a?.importance]??1)) - (({high:0,medium:1,low:2}[b?.importance]??1))
);

const dedupeNews = (items) => {
  const seen = new Set();
  return (items||[]).filter(n => {
    const k = (n?.title||"").slice(0,25).toLowerCase();
    if (!k || seen.has(k)) return false;
    seen.add(k); return true;
  });
};

  const handlePaste = (key, val) => {

    setParseOk(p => ({...p, [key]: tryParse(val) !== null ? "ok" : "err"}));

  const handleBuild = () => {

    const newsB = Array.isArray(B) ? B : [];
    const newsC = Array.isArray(C) ? C : [];

        },
        body,
        signal: AbortSignal.timeout(15000), // 15초 (Cold start 대비)
      });

      if (r.ok) {
        const d = await r.json();
        setCode(d?.code || null);
        showToast("💾 저장 완료!");
      } else {
        // 서버 에러 내용 확인
        let errMsg = `서버 오류 (HTTP ${r.status})`;
        try {
          const errBody = await r.json();
          if (errBody?.error) errMsg += `: ${errBody.error}`;
        } catch (_) {
          try { const t = await r.text(); if (t) errMsg += `: ${t.slice(0,80)}`; } catch(_){}
        }
        showToast(errMsg, 5000);
        console.error("[Briefr Save] " + errMsg);
      }
    } catch (e) {
      if (e.name === "AbortError" || e.name === "TimeoutError") {
        showToast("⏱ 저장 시간 초과 (15초). Vercel 서버 상태를 확인하세요.", 5000);
      } else if (e.message?.toLowerCase().includes("failed to fetch") || e.message?.toLowerCase().includes("networkerror")) {

      } else {
        showToast(`❌ 저장 실패: ${e.message}`, 5000);

                  <span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:3,textTransform:"uppercase",...(n.importance==="high"?{background:"var(--red2)",color:"var(--red)",border:"1px solid rgba(248,113,113,.25)"}:n.importance==="medium"?{background:"rgba(250,204,21,.1)",color:"#FACC15",border:"1px solid rgba(250,204,21,.25)"}:{background:"var(--surf2)",color:"var(--dim)",border:"1px solid var(--bdr)"})}}>{n.importance==="high"?"주요":n.importance==="medium"?"관심":"참고"}</span>
                  {n.category&&<span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"var(--surf2)",color:"var(--dim)",border:"1px solid var(--bdr)"}}>{n.category}</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  {n.pubTime&&<span style={{fontSize:9,color:"var(--dim)"}}>🕐{n.pubTime}</span>}
                  <span style={{fontSize:9,color:"var(--dim)"}}>{n.source}</span>
                </div>
              </div>
              <div style={{fontSize:13,fontWeight:500,lineHeight:1.5,marginBottom:n.summary?5:0}}>{n.title}</div>

            </div>

            <div>
              <div style={{padding:"8px 12px",background:"var(--surf2)",borderRadius:7,fontSize:11,color:"var(--muted)",marginBottom:12,lineHeight:1.7}}>

                {d.meta?.collectionWindow?.start && <span style={{color:"var(--dim)",marginLeft:8}}>🕐 {d.meta.collectionWindow.start} ~ {d.meta.collectionWindow.end}</span>}
              </div>
              {dom.length>0&&<>{SH(`국내 (${dom.length}건)`)}{RN(dom)}</>}
              {intl.length>0&&<div style={{marginTop:12}}>{SH(`해외 (${intl.length}건)`)}{RN(intl)}</div>}
              {cry.length>0&&<div style={{marginTop:12}}>{SH(`크립토 (${cry.length}건)`)}{RN(cry)}</div>}
              {!total&&<div style={{color:"var(--dim)",padding:"20px",textAlign:"center"}}>B/C 프롬프트 결과를 붙여넣으세요</div>}
            </div>
          );
        }

        case "insight": {
          const oi = d.opusInsights;

          return (
            <div>
              {oi ? (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                    <span style={{fontSize:10,padding:"3px 8px",borderRadius:4,background:"rgba(139,92,246,.15)",color:"#A78BFA",border:"1px solid rgba(139,92,246,.3)",fontWeight:600}}>🤖 OPUS 심층 분석</span>
                  </div>
                  {oi.executiveSummary && (
                    <div style={{padding:"16px 18px",background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:10,fontSize:13,lineHeight:1.9,marginBottom:12,color:"var(--txt)"}}>{oi.executiveSummary}</div>
                  )}
                  <div className="card" style={{padding:"18px 20px",marginBottom:10}}>
                    {SH("핵심 포인트")}
                    {(oi.keyPoints||[]).map((p,i) => (
                      <div key={i} style={{display:"flex",gap:10,marginBottom:12,alignItems:"flex-start"}}>
                        <div style={{width:24,height:24,borderRadius:"50%",background:"rgba(139,92,246,.15)",border:"1px solid rgba(139,92,246,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#A78BFA",flexShrink:0}}>{i+1}</div>
                        <div style={{fontSize:13,lineHeight:1.8,paddingTop:2}}>{p}</div>
                      </div>
                    ))}
                  </div>
                  {oi.sectorAnalysis && (
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
                      <div style={{padding:"12px 14px",background:"rgba(74,222,128,.08)",border:"1px solid rgba(74,222,128,.2)",borderRadius:8}}>
                        <div style={{fontSize:9,fontWeight:600,color:"var(--green)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>▲ 강세 섹터</div>
                        <div style={{fontSize:12,lineHeight:1.7,color:"var(--txt)"}}>{oi.sectorAnalysis.outperform}</div>
                      </div>
                      <div style={{padding:"12px 14px",background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.2)",borderRadius:8}}>
                        <div style={{fontSize:9,fontWeight:600,color:"var(--red)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>▼ 약세 섹터</div>
                        <div style={{fontSize:12,lineHeight:1.7,color:"var(--txt)"}}>{oi.sectorAnalysis.underperform}</div>
                      </div>
                    </div>
                  )}
                  {oi.macroReading && (
                    <div style={{padding:"14px 16px",background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:10,marginBottom:10}}>
                      <div style={{fontSize:9,fontWeight:600,color:"var(--blue)",letterSpacing:".1em",textTransform:"uppercase",marginBottom:6}}>매크로 환경 분석</div>
                      <div style={{fontSize:13,lineHeight:1.9}}>{oi.macroReading}</div>
                    </div>
                  )}
                  {(oi.riskFactors||[]).length > 0 && (
                    <div style={{background:"var(--red2)",border:"1px solid rgba(248,113,113,.2)",borderRadius:10,padding:"14px 16px",marginBottom:10}}>
                      <div style={{fontSize:9,fontWeight:600,color:"var(--red)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>⚠️ 리스크 요인</div>
                      {oi.riskFactors.map((r,i) => <div key={i} style={{fontSize:13,lineHeight:1.8,marginBottom:4}}>• {r}</div>)}
                    </div>
                  )}
                  {oi.watchlist && (
                    <div style={{padding:"14px 16px",background:"var(--amber2)",border:"1px solid rgba(232,168,53,.2)",borderRadius:10,marginBottom:10}}>
                      <div style={{fontSize:9,fontWeight:600,color:"var(--amber)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>📅 대응 전략</div>
                      {oi.watchlist.tomorrow && <div style={{fontSize:12,lineHeight:1.7,marginBottom:6}}><strong>내일:</strong> {oi.watchlist.tomorrow}</div>}
                      {oi.watchlist.thisWeek && <div style={{fontSize:12,lineHeight:1.7,marginBottom:6}}><strong>이번주:</strong> {oi.watchlist.thisWeek}</div>}
                      {oi.watchlist.strategy && <div style={{fontSize:13,lineHeight:1.7,fontWeight:600,color:"var(--amber)"}}><strong>전략:</strong> {oi.watchlist.strategy}</div>}
                    </div>
                  )}
                </>
              ) : (
                <>
                  <div style={{padding:"10px 14px",background:"rgba(139,92,246,.08)",border:"1px solid rgba(139,92,246,.2)",borderRadius:8,fontSize:11,color:"#A78BFA",marginBottom:12}}>
                    💡 F 프롬프트를 Claude Opus에 실행하면 훨씬 깊이 있는 분석이 제공됩니다
                  </div>
                  <div className="card" style={{padding:"18px 20px",marginBottom:10}}>
                    {SH("오늘의 핵심 포인트")}
                    {(ins?.keyPoints||[]).map((p,i) => (
                      <div key={i} style={{display:"flex",gap:10,marginBottom:10,alignItems:"flex-start"}}>
                        <div style={{width:24,height:24,borderRadius:"50%",background:"var(--amber2)",border:"1px solid rgba(232,168,53,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"var(--amber)",flexShrink:0}}>{i+1}</div>
                        <div style={{fontSize:13,lineHeight:1.7,paddingTop:2}}>{p}</div>
                      </div>
                    ))}
                  </div>
                  {ins?.watchout&&(
                    <div style={{background:"var(--red2)",border:"1px solid rgba(248,113,113,.2)",borderRadius:10,padding:"14px 16px",display:"flex",gap:10,marginBottom:8}}>
                      <span style={{fontSize:16,flexShrink:0}}>⚠️</span>
                      <div><div style={{fontSize:9,fontWeight:600,color:"var(--red)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:4}}>오늘의 리스크</div><div style={{fontSize:13,lineHeight:1.6}}>{ins.watchout}</div></div>
                    </div>
                  )}
                  {ins?.tomorrowFocus&&(
                    <div style={{background:"var(--amber2)",border:"1px solid rgba(232,168,53,.2)",borderRadius:10,padding:"12px 16px",display:"flex",gap:10,marginBottom:8}}>
                      <span style={{fontSize:14,flexShrink:0}}>📅</span>
                      <div><div style={{fontSize:9,color:"var(--amber)",fontWeight:600,letterSpacing:".08em",marginBottom:3}}>내일 주목</div><div style={{fontSize:13,lineHeight:1.6}}>{ins.tomorrowFocus}</div></div>
                    </div>
                  )}
                </>
              )}
              <div style={{padding:"8px 12px",background:"var(--surf2)",borderRadius:7,fontSize:10,color:"var(--dim)"}}>* 투자 결정은 반드시 본인의 판단으로 하세요.</div>
            </div>
          );
        }

        default: return null;
      }
    } catch(err) {
      return <div style={{color:"var(--red)",padding:16,fontSize:12}}>렌더링 오류: {err.message}</div>;
    }
  };

  const sentColor = (s) => {
    if (s === "강세") return {bg:"var(--green2)",c:"var(--green)",b:"rgba(74,222,128,.25)"};
    if (s === "약세") return {bg:"var(--red2)",  c:"var(--red)",  b:"rgba(248,113,113,.25)"};
    if (s === "주의") return {bg:"rgba(250,204,21,.1)",c:"#FACC15",b:"rgba(250,204,21,.25)"};
    return {bg:"var(--blue2)",c:"var(--blue)",b:"rgba(96,165,250,.25)"};
  };
  const riskColor = (r) => {
    if (r === "리스크 온")  return {bg:"var(--green2)",border:"1px solid rgba(74,222,128,.2)",dot:"var(--green)"};
    if (r === "리스크 오프") return {bg:"var(--red2)",  border:"1px solid rgba(248,113,113,.2)",dot:"var(--red)"};
    return {bg:"var(--blue2)",border:"1px solid rgba(96,165,250,.2)",dot:"var(--blue)"};
  };

  // ── 렌더 ─────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <style>{css}</style>

      {/* Nav */}
      <div style={{borderBottom:"1px solid var(--bdr2)",background:"var(--bg)",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:920,margin:"0 auto",padding:"0 16px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:26,height:26,background:"var(--amber)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#0D0F14",fontWeight:700}}>◈</div>
            <span style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700}}>Briefr</span>
            <span style={{fontSize:9,padding:"2px 7px",borderRadius:16,background:"rgba(74,222,128,.1)",color:"var(--green)",border:"1px solid rgba(74,222,128,.25)",fontWeight:600}}>API 비용 0원</span>
          </div>
          <div style={{display:"flex",gap:6}}>
            {screen !== "home"   && <button className="ghost" style={{fontSize:11,padding:"5px 11px"}} onClick={()=>setScreen("home")}>← 홈</button>}
            {screen === "report" && <button className="ghost" style={{fontSize:11,padding:"5px 11px"}} onClick={()=>setScreen("work")}>✏️ 재입력</button>}
          </div>
        </div>
      </div>

      <div style={{maxWidth:920,margin:"0 auto",padding:"24px 16px 80px"}}>

        {/* ── 홈 ── */}
        {screen === "home" && (
          <div className="fade" style={{textAlign:"center",paddingTop:40}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:".14em",textTransform:"uppercase",color:"var(--amber)",marginBottom:12}}>나만의 데일리 투자 브리핑</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,lineHeight:1.2,marginBottom:12}}>
              오늘 시장,<br/><span style={{color:"var(--amber)"}}>한눈에</span> 파악하세요
            </h1>
            <p style={{fontSize:13,color:"var(--muted)",lineHeight:2,maxWidth:400,margin:"0 auto 28px"}}>
              Claude 웹앱에서 직접 실행 → JSON 붙여넣기<br/>
              <strong style={{color:"var(--green)"}}>API 비용 0원 · 완전 무료</strong>
            </p>
            <button className="btn" onClick={handleGenPrompts} style={{padding:"14px 36px",fontSize:14}}>오늘 브리핑 시작하기</button>
            <div style={{marginTop:8,fontSize:11,color:"var(--dim)"}}>프롬프트 5개 자동 생성 · claude.ai 무료 플랜 사용 가능</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:40,textAlign:"left",maxWidth:560,margin:"40px auto 0"}}>
              {[
                {i:"📋",t:"프롬프트 복사",d:"버튼 클릭 → claude.ai 붙여넣기",c:"var(--amber)"},
                {i:"📥",t:"JSON 붙여넣기",d:"Claude 결과를 같은 화면에 바로 입력",c:"var(--blue)"},
                {i:"📊",t:"리포트 생성",d:"파싱 → 탭별 보기 → 저장 → 공유",c:"var(--green)"},
              ].map((item,i) => (
                <div key={i} className="card" style={{padding:"14px"}}>
                  <div style={{fontSize:18,marginBottom:6}}>{item.i}</div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:3,color:item.c}}>{item.t}</div>
                  <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.5}}>{item.d}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── 작업 화면 (프롬프트 + 붙여넣기 통합) ── */}
        {screen === "work" && (
          <div className="fade">
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:".14em",textTransform:"uppercase",color:"var(--amber)",marginBottom:6}}>복사 → claude.ai 실행 → 결과 붙여넣기</div>
              <div style={{fontSize:18,fontWeight:700,fontFamily:"'Playfair Display',serif",marginBottom:5}}>한 화면에서 순서대로</div>
              <div style={{fontSize:12,color:"var(--muted)",lineHeight:1.7}}>
                📋 복사 → <a href="https://claude.ai" target="_blank" style={{color:"var(--blue)"}}>claude.ai</a> 새 탭 붙여넣기 → 결과 JSON을 아래 칸에 붙여넣기
                {kst && <span style={{color:"var(--dim)",marginLeft:8}}>· {kst.start} ~ {kst.end}</span>}
              </div>
            </div>

            {FIELDS.map(({key,icon,label,req,hint}) => {
              const st = parseOk[key];
              return (
                <div key={key} className="card" style={{padding:"14px 16px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:12,fontWeight:600}}>{icon} {label}</span>
                      {req && <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"var(--red2)",color:"var(--red)",border:"1px solid rgba(248,113,113,.25)",fontWeight:600}}>필수</span>}
                      {st === "ok"  && <span style={{fontSize:11,color:"var(--green)"}}>✓ 유효</span>}
                      {st === "err" && <span style={{fontSize:11,color:"var(--red)"}}>✕ JSON 오류</span>}
                    </div>
                    <div style={{display:"flex",gap:5}}>
                      {pasted[key] && <button className="ghost" style={{fontSize:10,padding:"3px 8px"}} onClick={()=>handlePaste(key,"")}>지우기</button>}
                      {prompts && prompts[key]
                        ? <button className="btn" style={{fontSize:11,padding:"6px 12px"}} onClick={()=>copyText(prompts[key], label)}>📋 복사</button>
                        : <button className="ghost" style={{fontSize:11,padding:"6px 12px"}} onClick={handleGenPrompts}>생성</button>
                      }
                    </div>
                  </div>
                  {key === "F" ? (
                    <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.8,padding:"10px 12px",background:"var(--surf2)",borderRadius:7,border:"1px solid var(--bdr)"}}>
                      <div style={{marginBottom:6}}>👆 <strong style={{color:"var(--amber)"}}>A~E 완료 후</strong> 아래 F 프롬프트를 Claude에 붙여넣고 결과를 여기 붙여넣으세요.</div>
                      <div style={{fontSize:10,color:"var(--dim)"}}>Opus 모델이 전체 데이터를 분석해 깊이 있는 인사이트를 생성합니다.</div>
                      <textarea
                        rows={3}
                        placeholder="Opus 인사이트 JSON 붙여넣기 (선택)"
                        value={pasted[key]}
                        onChange={e => handlePaste(key, e.target.value)}
                        style={{width:"100%",marginTop:8,background:"var(--bg)",border:"1px solid "+(st==="ok"?"var(--green)":st==="err"?"var(--red)":"var(--bdr)"),color:"var(--txt)",borderRadius:7,padding:"8px 10px",fontSize:11,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5}}
                      />
                    </div>
                  ) : (
                    <textarea
                      rows={3}
                      placeholder={"Claude 결과 JSON → " + hint}
                      value={pasted[key]}
                      onChange={e => handlePaste(key, e.target.value)}
                      style={{width:"100%",background:"var(--surf2)",border:"1px solid "+(st==="ok"?"var(--green)":st==="err"?"var(--red)":"var(--bdr)"),color:"var(--txt)",borderRadius:7,padding:"8px 10px",fontSize:11,fontFamily:"monospace",resize:"vertical",outline:"none",lineHeight:1.5,transition:"border .2s"}}
                    />
                  )}
                </div>
              );
            })}

            <div style={{background:"var(--blue2)",border:"1px solid rgba(96,165,250,.2)",borderRadius:8,padding:"10px 14px",fontSize:11,color:"var(--blue)",marginBottom:12}}>
              💡 <strong>팁:</strong> claude.ai에서 탭 5개를 동시에 열고 A~E를 한꺼번에 실행하면 가장 빠릅니다!
            </div>
            <button className="btn" style={{width:"100%",padding:"13px",fontSize:14}} onClick={handleBuild}>
              📊 리포트 만들기
            </button>
            {(!parseOk.A || parseOk.A === "err") && (
              <div style={{fontSize:11,color:"var(--dim)",marginTop:6,textAlign:"center"}}>A(시장 데이터) JSON을 먼저 붙여넣어야 리포트를 만들 수 있어요</div>
            )}
          </div>
        )}

        {/* ── 리포트 ── */}
        {screen === "report" && report && (
          <div className="fade">
            {/* 저장/공유 */}
            {code ? (
              <div style={{background:"var(--surf)",border:"2px solid rgba(232,168,53,.35)",borderRadius:12,padding:"16px 18px",marginBottom:16}}>
                <div style={{fontSize:9,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--amber)",marginBottom:3}}>공유 코드 (24시간 유효)</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:700,letterSpacing:".2em",margin:"4px 0 10px"}}>{code}</div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button className="ghost" style={{fontSize:11}} onClick={()=>copyText(code,"코드")}>📋 코드 복사</button>
                  <button className="ghost" style={{fontSize:11}} onClick={()=>{
                    const t = `📊 Briefr 데일리 투자 브리핑\n${report.date}\n"${report.headline||""}"\n\n🔑 공유 코드: ${code}\n\n👉 briefr-api.vercel.app 접속 후 코드 입력\n(무료 열람 · 24시간 유효)`;
                    copyText(t,"카카오톡 공유");
                  }}>💬 카카오톡 공유</button>
                </div>
              </div>
            ) : (
              <div style={{background:"var(--surf2)",border:"1px solid var(--bdr)",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:12,color:"var(--muted)"}}>저장하면 6자리 공유 코드가 생성돼요</div>
                <button className="btn" style={{fontSize:12,padding:"8px 16px"}} onClick={handleSave} disabled={saving}>{saving?"저장 중...":"💾 저장 + 공유 코드 생성"}</button>
              </div>
            )}

            {/* 헤더 */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10,marginBottom:14}}>
              <div style={{flex:1,minWidth:180}}>
                <div style={{fontSize:9,fontWeight:600,letterSpacing:".14em",textTransform:"uppercase",color:"var(--amber)",marginBottom:5}}>데일리 브리핑 · {report.date}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,lineHeight:1.3}}>{report.headline||"오늘의 시장 브리핑"}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5}}>
                {(() => { const s = sentColor(report.sentiment); return <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:16,background:s.bg,color:s.c,border:`1px solid ${s.b}`}}>{report.sentiment||"중립"}</span>; })()}
                <div style={{fontSize:10,color:"var(--dim)",maxWidth:160,textAlign:"right",lineHeight:1.4}}>{report.sentimentReason}</div>
              </div>
            </div>

            {/* 리스크 배너 */}
            {(() => { const r = riskColor(report.riskLevel); return (
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:8,marginBottom:12,background:r.bg,border:r.border}}>
                <div style={{width:8,height:8,borderRadius:"50%",flexShrink:0,background:r.dot,boxShadow:`0 0 6px ${r.dot}`}}/>
                <div>
                  <div style={{fontSize:13,fontWeight:600}}>{report.riskLevel||"중립"}</div>
                  <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{report.riskReason}</div>
                </div>
              </div>
            ); })()}

            {/* 전략 */}
            {report.strategy && (
              <div style={{background:"var(--amber2)",border:"1px solid rgba(232,168,53,.25)",borderRadius:10,padding:"14px 16px",marginBottom:12}}>
                <div style={{fontSize:9,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"var(--amber)",marginBottom:5}}>오늘의 전략</div>
                <div style={{fontSize:15,fontWeight:600,fontFamily:"'Playfair Display',serif",lineHeight:1.5}}>{report.strategy}</div>
              </div>
            )}

            {/* 탭 */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:5,marginBottom:16}}>
              {TABS.map((t,i) => (
                <button key={t.id} className={"tab-btn"+(i===tabIdx?" on":"")} onClick={()=>setTabIdx(i)}>{t.l}</button>
              ))}
              <button onClick={()=>setScreen("work")} style={{gridColumn:"span 4",background:"var(--surf2)",border:"1px solid var(--bdr)",color:"var(--muted)",borderRadius:8,padding:"7px",fontSize:11,fontFamily:"'DM Sans',sans-serif",cursor:"pointer"}}>✏️ 데이터 재입력</button>
            </div>

            <div className="fade">{renderTab(TABS[tabIdx]?.id, report)}</div>
          </div>
        )}
      </div>

      {toast && <div className="toast-el">{toast}</div>}

      {/* 복사 모달 */}
      {modal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setModal(null)}>
          <div style={{background:"var(--surf)",border:"1px solid var(--amber)",borderRadius:12,padding:18,width:"100%",maxWidth:600,maxHeight:"80vh",display:"flex",flexDirection:"column",gap:10}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:600,color:"var(--amber)"}}>텍스트 클릭 → 전체 선택 → 길게 눌러 복사</span>
              <button onClick={()=>setModal(null)} style={{background:"none",border:"none",color:"var(--muted)",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
            </div>
            <textarea
              readOnly
              value={modal}
              onClick={e=>{e.target.select();e.target.setSelectionRange(0,99999);}}
              style={{flex:1,minHeight:260,background:"var(--surf2)",border:"1px solid var(--bdr)",color:"var(--txt)",borderRadius:8,padding:10,fontSize:10,fontFamily:"monospace",lineHeight:1.5,resize:"none",outline:"none"}}
            />
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(BriefrApp));
  </script>
</body>
</html>
